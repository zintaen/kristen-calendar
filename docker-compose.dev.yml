# Local development stack with hot reload. Source is bind-mounted; node_modules lives in a
# named volume so container (Linux) binaries never clash with your host (macOS) install.
#
# Prereq: a local database via Supabase CLI:  supabase start   (see DEVELOPMENT.md)
#
# Usage:
#   cp .env.example .env      # then fill dev values from `supabase start`
#   docker compose -f docker-compose.dev.yml up
#   # web -> http://localhost:8080   api -> http://localhost:3000
#
# The installer service runs `pnpm install` once; api/web wait for it, then start in watch mode.

services:
  installer:
    image: node:24-slim
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    networks:
      - genie-net

  api:
    image: node:24-slim
    working_dir: /app/services/genie-api
    command: sh -c "corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm dev"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LM_STUDIO_URL=${LM_STUDIO_URL:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      installer:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - genie-net

  genie-web:
    image: node:24-slim
    working_dir: /app/apps/web
    command: sh -c "corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm dev"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    depends_on:
      installer:
        condition: service_completed_successfully
      api:
        condition: service_started
    networks:
      - genie-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - genie-net

volumes:
  root_node_modules:
  pnpm_store:

networks:
  genie-net:
    driver: bridge
